<!DOCTYPE html>
<html th:replace="~{layout/base :: html}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 Book Catalog</h2>
        <a href="/books/add" class="btn btn-success">
            <i class="fas fa-plus"></i> Add New Book
        </a>
    </div>

    <!-- Search Form -->
    <form th:action="@{/books}" method="get" class="mb-4">
        <div class="input-group w-50">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Search by title, author, genre or ISBN...">
            <button class="btn btn-primary" type="submit">Search</button>
            <a th:if="${keyword}" href="/books" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Genre</th>
            <th>Available</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td><strong th:text="${book.title}"></strong></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.genre}"></td>
            <td>
                <span class="badge bg-success" th:text="${book.availableQuantity} + '/' + ${book.totalQuantity}"></span>
            </td>
            <td>
                <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-info btn-sm">View</a>
                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/books/delete/{id}(id=${book.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this book?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${books.isEmpty()}" class="text-center text-muted py-5">
        <h4>No books found</h4>
    </div>
</div>
</body>
</html>
